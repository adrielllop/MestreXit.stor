<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MestreXit • Loja de Games & Utilitários</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-card-hover: #181825;
            --border: #1e1e2e;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #c084fc;
            --accent2: #7c3aed;
            --accent-glow: rgba(192, 132, 252, 0.3);
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.1);
            --red: #ef4444;
            --orange: #f59e0b;
            --cyan: #06b6d4;
            --gold: #fbbf24;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(192, 132, 252, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 90%, rgba(6, 182, 212, 0.04) 0%, transparent 50%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a2a3a; }

        header {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0 24px;
            transition: var(--transition);
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
            gap: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-decoration: none;
            user-select: none;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 0 24px var(--accent-glow);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 40px rgba(192, 132, 252, 0.55); }
        }
        .logo-text span {
            background: linear-gradient(135deg, #c084fc, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .cart-btn {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .cart-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent2);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }
        .cart-count {
            background: var(--accent2);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); }
            60% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            gap: 28px;
            position: relative;
        }
        .content-area { flex: 1; min-width: 0; }

        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            padding-bottom: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .filters-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 9px 18px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            transition: var(--transition);
            user-select: none;
        }
        .filter-chip:hover {
            border-color: #555;
            color: #ddd;
            background: var(--bg-card-hover);
        }
        .filter-chip.active {
            background: var(--accent2);
            border-color: var(--accent2);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 18px rgba(124, 58, 237, 0.4);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }
        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(192, 132, 252, 0.04) 0%, transparent 60%);
            pointer-events: none;
            transition: var(--transition);
        }
        .product-card:hover {
            border-color: #3a3a55;
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.6);
            transform: translateY(-3px);
            background: var(--bg-card-hover);
        }
        .product-card:hover::before {
            background: radial-gradient(circle at 30% 20%, rgba(192, 132, 252, 0.1) 0%, transparent 60%);
        }
        .product-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 50px;
            background: var(--green-bg);
            color: var(--green);
            align-self: flex-start;
        }
        .product-badge.hot { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .product-badge.premium { background: rgba(251, 191, 36, 0.15); color: var(--gold); }
        .product-name { font-size: 1rem; font-weight: 600; color: #f1f1f5; line-height: 1.35; flex-grow: 1; }
        .product-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
        .product-price { font-size: 1.35rem; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
        .product-price small { font-size: 0.8rem; color: var(--text-secondary); font-weight: 400; }
        .add-to-cart-btn {
            background: var(--accent2);
            color: #fff;
            border: none;
            padding: 9px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .add-to-cart-btn:hover {
            background: #8b5cf6;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
            transform: scale(1.04);
        }
        .add-to-cart-btn.added { background: var(--green); animation: pulse-green 0.5s ease; }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 rgba(16, 185, 129, 0); }
            50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.6); }
        }

        .cart-sidebar {
            width: 380px;
            min-width: 340px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            position: sticky;
            top: 92px;
            align-self: flex-start;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .cart-sidebar h3 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #fff; }
        .cart-empty { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 0.95rem; }
        .cart-empty .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name { font-weight: 600; font-size: 0.9rem; color: #e0e0e0; line-height: 1.3; }
        .cart-item-price { font-size: 0.85rem; color: var(--text-secondary); margin-top: 2px; }
        .cart-item-remove { background: none; border: none; color: #888; cursor: pointer; font-size: 1.1rem; padding: 4px 8px; border-radius: 50%; transition: var(--transition); }
        .cart-item-remove:hover { color: var(--red); background: rgba(239, 68, 68, 0.1); }
        .cart-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            text-align: right;
            padding-top: 8px;
            border-top: 2px solid var(--border);
            margin-top: auto;
        }
        .checkout-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.3px;
            transition: var(--transition);
            width: 100%;
        }
        .checkout-btn:hover { box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); transform: translateY(-2px); }
        .checkout-btn:disabled { background: #333; cursor: not-allowed; box-shadow: none; transform: none; }

        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1a1a25;
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            animation: slideInRight 0.4s ease, fadeOutRight 0.4s ease 2.2s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success { border-left: 4px solid var(--green); }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(120px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOutRight {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(80px); }
        }

        @media (max-width: 1100px) {
            .main-container { flex-direction: column; }
            .cart-sidebar { width: 100%; min-width: auto; position: relative; top: auto; max-height: none; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
        }
        @media (max-width: 600px) {
            .header-inner { height: 56px; gap: 10px; }
            .logo { font-size: 1.3rem; }
            .logo-icon { width: 32px; height: 32px; font-size: 1rem; }
            .cart-btn { padding: 8px 14px; font-size: 0.8rem; gap: 4px; }
            .products-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .product-card { padding: 14px; gap: 6px; }
            .product-name { font-size: 0.85rem; }
            .product-price { font-size: 1.1rem; }
            .add-to-cart-btn { padding: 7px 12px; font-size: 0.75rem; }
            .filter-chip { padding: 7px 13px; font-size: 0.78rem; }
            .main-container { padding: 12px; gap: 16px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="#" class="logo" onclick="resetFilters()">
                <div class="logo-icon">⚡</div>
                <div class="logo-text"><span>MestreXit</span></div>
            </a>
            <button class="cart-btn" onclick="scrollToCart()" aria-label="Carrinho">
                🛒 Carrinho
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <div class="main-container">
        <div class="content-area">
            <div class="filters-bar" id="filtersBar">
                <button class="filter-chip active" data-category="all">🏠 Todos</button>
                <button class="filter-chip" data-category="gerador-sensi">🎯 Gerador de Sensi</button>
                <button class="filter-chip" data-category="mod-drip">💧 Mod Drip</button>
                <button class="filter-chip" data-category="hg-cheats">🛡️ HG Cheats</button>
                <button class="filter-chip" data-category="painel-auxilio">📋 Painel Auxílio</button>
                <button class="filter-chip" data-category="contas">👤 Contas</button>
                <button class="filter-chip" data-category="arquivos-ff">📁 Arquivos FF</button>
                <button class="filter-chip" data-category="gerais">📦 Gerais</button>
                <button class="filter-chip" data-category="combos">🎁 Combos</button>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <aside class="cart-sidebar" id="cartSidebar">
            <h3>🛒 Seu Carrinho</h3>
            <div id="cartItems">
                <div class="cart-empty">
                    <span class="icon">🛍️</span>
                    Seu carrinho está vazio.<br>Adicione produtos incríveis!
                </div>
            </div>
            <div class="cart-total" id="cartTotal">Total: R$ 0,00</div>
            <button class="checkout-btn" id="checkoutBtn" disabled>Finalizar Compra 🔒</button>
        </aside>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ✅ SEU NÚMERO DE WHATSAPP CONFIGURADO
            const WHATSAPP_NUMBER = "5534999786099";

            const products = [
                { id: 'gs1', name: 'Gerador de Sensi com mais sensibilidades', price: 4.00, category: 'gerador-sensi', badge: '', variant: 'Texto' },
                { id: 'gs2', name: 'Gerador de Sensi Vip✓ para Android', price: 13.00, category: 'gerador-sensi', badge: 'premium', variant: 'Texto' },
                { id: 'gs3', name: 'Gerador de sensi com mais variações para iPhone', price: 10.00, category: 'gerador-sensi', badge: '', variant: 'Texto' },
                { id: 'gs4', name: 'Gerador de sensi com mais sensibilidades para iPhone', price: 6.00, category: 'gerador-sensi', badge: '', variant: 'Texto' },
                { id: 'gs5', name: 'Gerador básico iPhone', price: 3.00, category: 'gerador-sensi', badge: '', variant: 'Texto' },
                { id: 'gs6', name: 'Gerador de Sensi básico', price: 2.00, category: 'gerador-sensi', badge: '', variant: 'Texto' },
                { id: 'gs7', name: 'Gerador de sensi com mais variações', price: 8.00, category: 'gerador-sensi', badge: '', variant: 'Texto' },
                { id: 'gs8', name: 'Gerador de sensi VIP', price: 10.00, category: 'gerador-sensi', badge: 'premium', variant: 'Texto' },
                { id: 'gs9', name: 'Gerador simples', price: 1.00, category: 'gerador-sensi', badge: '', variant: 'Texto' },
                { id: 'md1', name: 'Key 30 dias - Mod Drip', price: 70.00, category: 'mod-drip', badge: 'premium', variant: 'Key 30 dias' },
                { id: 'md2', name: 'Key 7 dias - Mod Drip', price: 40.00, category: 'mod-drip', badge: '', variant: 'Key 7 dias' },
                { id: 'md3', name: 'Key 3 dias - Mod Drip', price: 29.00, category: 'mod-drip', badge: '', variant: 'Key 3 dias' },
                { id: 'md4', name: 'Key 1 dia - Mod Drip', price: 15.50, category: 'mod-drip', badge: '', variant: 'Key 1 dia' },
                { id: 'md5', name: 'Mod Drip (obs: apenas 64BITs)', price: 70.00, category: 'mod-drip', badge: 'hot', variant: 'Info' },
                { id: 'hg1', name: 'Key 30 dias - HG Cheats', price: 60.00, category: 'hg-cheats', badge: 'premium', variant: 'Key 30 dias' },
                { id: 'hg2', name: 'Key 10 dias - HG Cheats', price: 40.00, category: 'hg-cheats', badge: '', variant: 'Key 10 dias' },
                { id: 'hg3', name: 'Key 7 dias - HG Cheats', price: 25.00, category: 'hg-cheats', badge: '', variant: 'Key 7 dias' },
                { id: 'hg4', name: 'Key 1 dia - HG Cheats', price: 11.99, category: 'hg-cheats', badge: '', variant: 'Key 1 dia' },
                { id: 'pa1', name: 'Injector DRIANIN', price: 5.00, category: 'painel-auxilio', badge: '', variant: 'Texto' },
                { id: 'pa2', name: 'Painel disfarçado ChatGPT', price: 5.00, category: 'painel-auxilio', badge: '', variant: 'Texto' },
                { id: 'pa3', name: 'Painel Alpha', price: 9.99, category: 'painel-auxilio', badge: '', variant: 'Texto' },
                { id: 'pa4', name: 'Painel Round Six', price: 10.00, category: 'painel-auxilio', badge: '', variant: 'Texto' },
                { id: 'ct1', name: 'Conta via Google', price: 200.00, category: 'contas', badge: 'premium', variant: 'Linhas' },
                { id: 'ct2', name: 'Conta Free Fire Nível 21 + Troca de Nick', price: 6.50, category: 'contas', badge: 'hot', variant: 'Linhas' },
                { id: 'af1', name: 'Curso de como fazer auxílio de mira', price: 20.00, category: 'arquivos-ff', badge: '', variant: 'Texto' },
                { id: 'af2', name: 'Regedit', price: 7.99, category: 'arquivos-ff', badge: '', variant: 'Texto' },
                { id: 'af3', name: 'Pack de textura', price: 8.00, category: 'arquivos-ff', badge: '', variant: 'Texto' },
                { id: 'gr1', name: 'Nubank F@K3', price: 5.00, category: 'gerais', badge: '', variant: 'Texto' },
                { id: 'gr2', name: 'Simulador de apostas', price: 1.00, category: 'gerais', badge: '', variant: 'Texto' },
                { id: 'gr3', name: 'Painel Otimização + Sensi', price: 7.99, category: 'gerais', badge: '', variant: 'Texto' },
                { id: 'cb1', name: 'Combo (Painel Auxílio + Gerador Sensi VIP + Painel Otimização)', price: 20.00, category: 'combos', badge: 'premium', variant: 'Texto' },
            ];

            let cart = [];
            let currentFilter = 'all';

            const productsGrid = document.getElementById('productsGrid');
            const cartItemsContainer = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            const cartCountEl = document.getElementById('cartCount');
            const checkoutBtn = document.getElementById('checkoutBtn');
            const toastContainer = document.getElementById('toastContainer');
            const filterChips = document.querySelectorAll('.filter-chip');

            function formatPrice(value) {
                return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }

            function getBadgeClass(badge) {
                if (badge === 'premium') return 'premium';
                if (badge === 'hot') return 'hot';
                return '';
            }

            function getBadgeLabel(badge) {
                if (badge === 'premium') return '⭐ Premium';
                if (badge === 'hot') return '🔥 Destaque';
                return '';
            }

            function renderProducts(filter = 'all') {
                const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
                if (filtered.length === 0) {
                    productsGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary);">
                        <span style="font-size:3rem;display:block;">🔍</span> Nenhum produto encontrado.
                    </div>`;
                    return;
                }
                productsGrid.innerHTML = filtered.map(p => {
                    const badgeHtml = p.badge ? `<span class="product-badge ${getBadgeClass(p.badge)}">${getBadgeLabel(p.badge)}</span>` : '';
                    const inCart = cart.find(item => item.id === p.id);
                    const btnClass = inCart ? 'add-to-cart-btn added' : 'add-to-cart-btn';
                    const btnText = inCart ? '✓ Adicionado' : '+ Carrinho';
                    return `
                    <div class="product-card" data-id="${p.id}">
                        ${badgeHtml}
                        <div class="product-name">${p.name}</div>
                        <div class="product-meta">
                            <span class="product-price">R$ ${formatPrice(p.price)}</span>
                            <button class="${btnClass}" onclick="event.stopPropagation(); addToCart('${p.id}')" data-btn-id="${p.id}">${btnText}</button>
                        </div>
                        <small style="color:var(--text-secondary);font-size:0.7rem;">Variante: ${p.variant}</small>
                    </div>`;
                }).join('');

                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', function() { addToCart(this.dataset.id); });
                });
            }

            function renderCart() {
                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = `<div class="cart-empty"><span class="icon">🛍️</span>Seu carrinho está vazio.<br>Adicione produtos incríveis!</div>`;
                } else {
                    cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">R$ ${formatPrice(item.price)}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart('${item.id}')" title="Remover">✕</button>
                    </div>`).join('');
                }
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                cartTotalEl.textContent = `Total: R$ ${formatPrice(total)}`;
                cartCountEl.textContent = cart.length;
                checkoutBtn.disabled = cart.length === 0;

                document.querySelectorAll('[data-btn-id]').forEach(btn => {
                    const pid = btn.dataset.btnId;
                    const inCart = cart.find(item => item.id === pid);
                    if (inCart) {
                        btn.classList.add('added');
                        btn.textContent = '✓ Adicionado';
                    } else {
                        btn.classList.remove('added');
                        btn.textContent = '+ Carrinho';
                    }
                });
            }

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `${type === 'success' ? '✅' : 'ℹ️'} ${message}`;
                toastContainer.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2500);
            }

            window.addToCart = function(productId) {
                const product = products.find(p => p.id === productId);
                if (!product) return;
                if (cart.find(item => item.id === productId)) {
                    showToast('Este produto já está no carrinho!', 'info');
                    return;
                }
                cart.push({ id: product.id, name: product.name, price: product.price });
                renderCart();
                renderProducts(currentFilter);
                showToast(`"${product.name}" adicionado ao carrinho!`);
                if (window.innerWidth <= 1100) {
                    document.getElementById('cartSidebar').scrollIntoView({ behavior: 'smooth' });
                }
            };

            window.removeFromCart = function(productId) {
                const product = products.find(p => p.id === productId);
                cart = cart.filter(item => item.id !== productId);
                renderCart();
                renderProducts(currentFilter);
                if (product) showToast(`"${product.name}" removido do carrinho.`, 'info');
            };

            window.scrollToCart = function() {
                document.getElementById('cartSidebar').scrollIntoView({ behavior: 'smooth' });
            };

            window.resetFilters = function() {
                setFilter('all');
            };

            function setFilter(category) {
                currentFilter = category;
                filterChips.forEach(chip => chip.classList.toggle('active', chip.dataset.category === category));
                renderProducts(category);
            }

            filterChips.forEach(chip => chip.addEventListener('click', function() {
                setFilter(this.dataset.category);
            }));

            // ✅ CHECKOUT VIA WHATSAPP COM MENSAGEM PRONTA
            checkoutBtn.addEventListener('click', function() {
                if (cart.length === 0) return;
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                const itemList = cart.map(item => `• ${item.name} - R$ ${formatPrice(item.price)}`).join('\n');
                const message = `🛒 *Novo Pedido - MestreXit*%0A%0A${encodeURIComponent(itemList)}%0A%0A💵 *Total: R$ ${formatPrice(total)}*%0A%0AOlá, tenho interesse nesses itens!`;
                const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
                
                if (confirm(`Confirme seu pedido:\n\n${itemList}\n\nTotal: R$ ${formatPrice(total)}\n\nSerá direcionado ao WhatsApp.`)) {
                    window.open(whatsappUrl, '_blank');
                    showToast('Redirecionando para o WhatsApp...', 'success');
                }
            });

            renderProducts('all');
            renderCart();
            console.log('%c⚡ MestreXit %cpronto para vender!', 'color:#c084fc;font-size:1.5rem;', 'color:#aaa;');
        })();
    </script>
</body>
</html>
